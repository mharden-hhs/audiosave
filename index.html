<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HPS YouTube Audio Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root {
      --bs-body-font-family: 'DM Sans', sans-serif;
      --bs-body-bg: #f5f6fa;
      --bs-body-color: #1a1d2e;
      --brand: #2563eb;
      --brand-light: #eff6ff;
      --brand-border: #bfdbfe;
      --success-soft: #f0fdf4;
      --success-border: #bbf7d0;
      --error-soft: #fff1f2;
      --error-border: #fecdd3;
      --mono: 'DM Mono', monospace;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.08);
    }

    body {
      background: var(--bs-body-bg);
      min-height: 100vh;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    .app-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .app-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: var(--brand);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 20px;
      box-shadow: 0 2px 8px rgba(37,99,235,0.3);
    }

    .app-title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--bs-body-color);
      margin: 0;
    }

    .app-subtitle {
      font-size: 14px;
      color: #6b7280;
      margin: 0;
    }

    /* ── Server status pill ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: var(--mono);
      padding: 4px 12px;
      border-radius: 99px;
      background: #f3f4f6;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      margin-top: 12px;
      transition: all 0.3s;
    }

    .status-pill.online {
      background: var(--success-soft);
      color: #16a34a;
      border-color: var(--success-border);
    }

    .status-pill.offline {
      background: var(--error-soft);
      color: #dc2626;
      border-color: var(--error-border);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .status-pill.online .status-dot {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Card ── */
    .app-card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      box-shadow: var(--card-shadow);
      padding: 32px;
      transition: box-shadow 0.2s;
    }

    /* ── Section labels ── */
    .field-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    /* ── Inputs ── */
    .form-control {
      border-color: #e5e7eb;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--bs-body-color);
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .form-control:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: #fff;
    }

    .form-control::placeholder { color: #9ca3af; }

    .input-group-text {
      background: #f3f4f6;
      border-color: #e5e7eb;
      border-radius: 10px 0 0 10px;
      color: #6b7280;
    }

    /* ── Filename badge ── */
    .filename-outer { position: relative; }

    .auto-badge {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 99px;
      display: none;
      pointer-events: none;
    }

    .auto-badge.fetching {
      display: inline-block;
      background: var(--brand-light);
      color: var(--brand);
      border: 1px solid var(--brand-border);
    }

    .auto-badge.auto {
      display: inline-block;
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    /* ── Toggle button groups ── */
    .toggle-group {
      display: flex;
      gap: 8px;
    }

    .toggle-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid #e5e7eb;
      background: #fafafa;
      color: #6b7280;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      line-height: 1.3;
    }

    .toggle-btn:hover:not(.active) {
      border-color: #d1d5db;
      background: #f3f4f6;
      color: #374151;
    }

    .toggle-btn.active {
      border-color: var(--brand);
      background: var(--brand-light);
      color: var(--brand);
      font-weight: 600;
    }

    .toggle-btn .sub {
      display: block;
      font-size: 11px;
      font-weight: 400;
      margin-top: 2px;
      opacity: 0.75;
    }

    /* ── WAV note ── */
    .wav-note {
      display: none;
      font-size: 12px;
      color: #6b7280;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 12px;
    }
    .wav-note.visible { display: block; }

    /* ── Submit button ── */
    .btn-extract {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 1px 3px rgba(37,99,235,0.3);
    }

    .btn-extract:hover:not(:disabled) {
      background: #1d4ed8;
      box-shadow: 0 4px 12px rgba(37,99,235,0.35);
      transform: translateY(-1px);
    }

    .btn-extract:active { transform: translateY(0); }

    .btn-extract:disabled {
      background: #e5e7eb;
      color: #9ca3af;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Divider ── */
    .section-divider {
      border: none;
      border-top: 1px solid #f3f4f6;
      margin: 24px 0;
    }

    /* ── Status panel ── */
    .status-panel {
      display: none;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
    }

    .status-panel.visible { display: block; }
    .status-panel.loading { background: var(--brand-light); border: 1px solid var(--brand-border); color: var(--brand); }
    .status-panel.success { background: var(--success-soft); border: 1px solid var(--success-border); color: #15803d; }
    .status-panel.error   { background: var(--error-soft);   border: 1px solid var(--error-border);   color: #dc2626; }

    .status-panel .status-icon { font-size: 16px; margin-right: 6px; }

    /* ── Progress bar ── */
    .progress-wrap {
      display: none;
      margin-top: 10px;
    }
    .progress-wrap.visible { display: block; }

    .progress {
      height: 4px;
      border-radius: 99px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 99px;
      width: 35%;
      animation: indeterminate 1.5s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); width: 40%; }
      100% { transform: translateX(280%);  width: 40%; }
    }

    /* ── Footer meta ── */
    .meta-strip {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .meta-item {
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-item i { font-size: 13px; }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #9ca3af;
    }

    /* ── Spinner ── */
    .spinner-sm {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app-card { animation: fadeUp 0.4s ease forwards; }
  </style>
</head>
<body>
<div class="container" style="max-width: 580px;">

  <!-- Header -->
  <div class="app-header">
    <div class="app-logo">
      <div class="logo-icon"><i class="bi bi-music-note-beamed"></i></div>
      <h1 class="app-title">AudioRip</h1>
    </div>
    <p class="app-subtitle">Extract audio from YouTube videos</p>
    <div>
      <span class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusPillText">Checking server...</span>
      </span>
    </div>
  </div>

  <!-- Main card -->
  <div class="app-card">

    <!-- URL -->
    <div class="mb-4">
      <div class="field-label">YouTube URL</div>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
        <input type="text" class="form-control" id="urlInput"
               placeholder="https://youtube.com/watch?v=..."
               style="border-radius: 0 10px 10px 0;" />
      </div>
    </div>

    <!-- Filename -->
    <div class="mb-4">
      <div class="field-label">Filename</div>
      <div class="filename-outer">
        <input type="text" class="form-control" id="filenameInput"
               placeholder="Paste a URL above to auto-fill..."
               style="padding-right: 80px;" />
        <span class="auto-badge" id="filenameBadge"></span>
      </div>
      <div class="form-text" id="filenameHint" style="display:none;"></div>
    </div>

    <hr class="section-divider" />

    <!-- Format -->
    <div class="mb-3">
      <div class="field-label">Format</div>
      <div class="toggle-group" id="formatGroup">
        <button class="toggle-btn active" data-fmt="mp3">
          <i class="bi bi-file-earmark-music"></i> MP3
        </button>
        <button class="toggle-btn" data-fmt="wav">
          <i class="bi bi-file-earmark-binary"></i> WAV
        </button>
      </div>
    </div>

    <!-- Quality -->
    <div class="mb-4" id="qualitySection">
      <div class="field-label">Quality</div>
      <div class="toggle-group" id="qualityGroup">
        <button class="toggle-btn active" data-q="best">
          Best
          <span class="sub">VBR highest</span>
        </button>
        <button class="toggle-btn" data-q="320">
          320 kbps
          <span class="sub">CBR high</span>
        </button>
        <button class="toggle-btn" data-q="192">
          192 kbps
          <span class="sub">CBR medium</span>
        </button>
        <button class="toggle-btn" data-q="128">
          128 kbps
          <span class="sub">CBR small</span>
        </button>
      </div>
    </div>

    <div class="wav-note mb-4" id="wavNote">
      <i class="bi bi-info-circle me-1"></i>
      WAV is always lossless — quality selector does not apply.
    </div>

    <!-- Submit -->
    <button class="btn-extract" id="extractBtn" onclick="startExtraction()">
      <i class="bi bi-download"></i> Extract &amp; Download
    </button>

    <!-- Status -->
    <div class="mt-3">
      <div class="status-panel" id="statusPanel"></div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress">
          <div class="progress-bar-fill"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Meta strip -->
  <div class="meta-strip">
    <span class="meta-item"><i class="bi bi-hdd"></i> localhost:5001</span>
    <span class="meta-item"><i class="bi bi-gear"></i> yt-dlp + ffmpeg</span>
    <span class="meta-item"><i class="bi bi-file-earmark-music"></i> MP3 / WAV</span>
  </div>

  <footer>
    For educational use only &mdash; respect copyright laws and YouTube's Terms of Service.
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
  const SERVER = 'http://localhost:5001';
  let selectedFormat  = 'mp3';
  let selectedQuality = 'best';
  let titleFetchTimer = null;
  let lastFetchedUrl  = '';

  // ── Format toggle ───────────────────────────────────────
  document.querySelectorAll('#formatGroup .toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#formatGroup .toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFormat = btn.dataset.fmt;
      const isWav = selectedFormat === 'wav';
      document.getElementById('qualitySection').style.display = isWav ? 'none' : 'block';
      document.getElementById('wavNote').classList.toggle('visible', isWav);
    });
  });

  // ── Quality toggle ──────────────────────────────────────
  document.querySelectorAll('#qualityGroup .toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#qualityGroup .toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedQuality = btn.dataset.q;
    });
  });

  // ── Server health check ─────────────────────────────────
  async function checkServer() {
    const pill = document.getElementById('statusPill');
    const text = document.getElementById('statusPillText');
    try {
      const res = await fetch(`${SERVER}/health`, { signal: AbortSignal.timeout(3000) });
      if (res.ok) {
        pill.className    = 'status-pill online';
        text.textContent  = 'Server online';
        return true;
      }
    } catch (_) {}
    pill.className   = 'status-pill offline';
    text.textContent = 'Server offline — run: python3 server.py';
    return false;
  }

  checkServer();

  // ── Auto-fetch title ────────────────────────────────────
  document.getElementById('urlInput').addEventListener('input', () => {
    clearTimeout(titleFetchTimer);
    const url = document.getElementById('urlInput').value.trim();
    if (!url.includes('youtube.com') && !url.includes('youtu.be')) return;
    if (url === lastFetchedUrl) return;
    titleFetchTimer = setTimeout(() => fetchTitle(url), 600);
  });

  async function fetchTitle(url) {
    const input = document.getElementById('filenameInput');
    const badge = document.getElementById('filenameBadge');
    const hint  = document.getElementById('filenameHint');
    if (input.dataset.userEdited === 'true') return;

    badge.textContent = 'Fetching...';
    badge.className   = 'auto-badge fetching';

    try {
      const res  = await fetch(`${SERVER}/title`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (data.title) {
        input.value              = data.title;
        input.dataset.autoFilled = 'true';
        badge.textContent        = '✓ Auto';
        badge.className          = 'auto-badge auto';
        hint.textContent         = 'Title fetched from video — edit freely.';
        hint.style.display       = 'block';
        lastFetchedUrl           = url;
      } else {
        badge.className    = 'auto-badge';
        hint.style.display = 'none';
      }
    } catch (_) {
      badge.className    = 'auto-badge';
      hint.style.display = 'none';
    }
  }

  document.getElementById('filenameInput').addEventListener('input', function() {
    if (this.dataset.autoFilled === 'true') this.dataset.autoFilled = '';
    this.dataset.userEdited = this.value.trim() ? 'true' : '';
    if (this.dataset.userEdited) document.getElementById('filenameBadge').className = 'auto-badge';
  });

  // ── Status helpers ──────────────────────────────────────
  function setStatus(html, type) {
    const panel = document.getElementById('statusPanel');
    panel.className = `status-panel visible ${type}`;
    const icons = { loading: '⏳', success: '✓', error: '✕' };
    panel.innerHTML = `<span class="status-icon">${icons[type]}</span>${html}`;
  }

  function showProgress(on) {
    document.getElementById('progressWrap').classList.toggle('visible', on);
  }

  // ── Main extraction ─────────────────────────────────────
  async function startExtraction() {
    const url      = document.getElementById('urlInput').value.trim();
    const filename = document.getElementById('filenameInput').value.trim();
    const btn      = document.getElementById('extractBtn');

    if (!url) { setStatus('Please enter a YouTube URL.', 'error'); return; }
    if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
      setStatus("That doesn't look like a YouTube URL.", 'error'); return;
    }

    const online = await checkServer();
    if (!online) {
      setStatus('Cannot reach local server. Make sure <code>python3 server.py</code> is running.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-sm"></span> Extracting...';
    const qualityLabel = selectedFormat === 'wav' ? 'lossless' : selectedQuality;
    setStatus(`Extracting audio (${selectedFormat.toUpperCase()}, ${qualityLabel})...`, 'loading');
    showProgress(true);

    try {
      const response = await fetch(`${SERVER}/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, format: selectedFormat, quality: selectedQuality, filename }),
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);

      const { token, filename: finalName } = data;
      const a = document.createElement('a');
      a.href = `${SERVER}/download/${token}`;
      a.download = finalName;
      document.body.appendChild(a);
      a.click();
      a.remove();

      showProgress(false);
      setStatus(`Downloaded: <strong>${finalName}</strong>`, 'success');

    } catch (err) {
      showProgress(false);
      setStatus(`${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-download"></i> Extract &amp; Download';
    }
  }

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startExtraction();
  });
</script>
</body>
</html>
