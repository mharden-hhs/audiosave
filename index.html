<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AudioRip — YouTube Audio Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #e8ff47;
      --error: #ff4747;
      --success: #6fff8e;
      --text: #f0f0f0;
      --muted: #555;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease forwards;
    }

    header { margin-bottom: 56px; }

    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    h1 span { color: var(--accent); display: block; }

    .tagline {
      margin-top: 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* Server status indicator */
    .server-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.offline { background: var(--error);   box-shadow: 0 0 6px var(--error); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 36px;
      position: relative;
      margin-bottom: 24px;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 28px;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .format-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .format-btn {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .format-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,255,71,0.05);
    }

    .format-btn:hover:not(.active) { border-color: #333; color: #888; }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn:hover:not(:disabled) { background: #d4eb00; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      background: #1e1e1e;
      color: var(--muted);
      cursor: not-allowed;
    }

    /* Status panel */
    .status-panel {
      display: none;
      border: 1px solid var(--border);
      padding: 24px;
      background: var(--surface);
      margin-bottom: 0;
    }
    .status-panel.visible { display: block; }

    .status-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .status-msg {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.8;
    }

    .status-msg.loading { color: var(--accent); }
    .status-msg.error   { color: var(--error); }
    .status-msg.success { color: var(--success); }

    .progress-bar {
      height: 2px;
      background: var(--border);
      margin-top: 16px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.visible { display: block; }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 30%;
      animation: indeterminate 1.4s ease-in-out infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); width: 40%; }
      100% { transform: translateX(280%);  width: 40%; }
    }

    /* Info strip */
    .info-strip {
      display: flex;
      gap: 24px;
      margin-top: 32px;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .info-item .info-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .info-item .info-val { font-size: 13px; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 1px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 48px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">// Educational Tool</div>
    <h1>AUDIO<span>RIP</span></h1>
    <p class="tagline">YouTube → MP3 / WAV · runs on your machine</p>
    <div class="server-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking local server...</span>
    </div>
  </header>

  <div class="card">
    <label for="urlInput">YouTube URL</label>
    <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=..." />

    <label>Output Format</label>
    <div class="format-row">
      <div class="format-btn active" data-fmt="mp3">MP3</div>
      <div class="format-btn" data-fmt="wav">WAV</div>
    </div>

    <button class="submit-btn" id="extractBtn" onclick="startExtraction()">
      Extract &amp; Download
    </button>
  </div>

  <div class="status-panel" id="statusPanel">
    <div class="status-label">Status</div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="info-strip">
    <div class="info-item">
      <div class="info-title">Backend</div>
      <div class="info-val">localhost:5001</div>
    </div>
    <div class="info-item">
      <div class="info-title">Engine</div>
      <div class="info-val">yt-dlp + ffmpeg</div>
    </div>
    <div class="info-item">
      <div class="info-title">Formats</div>
      <div class="info-val">MP3 / WAV</div>
    </div>
  </div>

</div>

<footer>
  For educational use only · Respect copyright laws and YouTube's Terms of Service
</footer>

<script>
  const SERVER = 'http://localhost:5001';
  let selectedFormat = 'mp3';

  // ── Format toggle ───────────────────────────────────────
  document.querySelectorAll('.format-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFormat = btn.dataset.fmt;
    });
  });

  // ── Server health check on load ─────────────────────────
  async function checkServer() {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    try {
      const res = await fetch(`${SERVER}/health`, { signal: AbortSignal.timeout(3000) });
      if (res.ok) {
        dot.className  = 'status-dot online';
        text.textContent = 'Local server online';
        return true;
      }
    } catch (_) {}
    dot.className  = 'status-dot offline';
    text.textContent = 'Local server offline — run: python server.py';
    return false;
  }

  checkServer();

  // ── UI helpers ──────────────────────────────────────────
  function setStatus(msg, type = 'loading') {
    const panel = document.getElementById('statusPanel');
    const el    = document.getElementById('statusMsg');
    panel.classList.add('visible');
    el.className = 'status-msg ' + type;
    el.innerHTML = type === 'loading'
      ? `<span class="spinner"></span>${msg}`
      : msg;
  }

  function showProgress(visible) {
    document.getElementById('progressBar').classList.toggle('visible', visible);
  }

  // ── Main extraction ─────────────────────────────────────
  async function startExtraction() {
    const url = document.getElementById('urlInput').value.trim();
    const btn = document.getElementById('extractBtn');

    if (!url) {
      setStatus('Please enter a YouTube URL.', 'error');
      return;
    }

    if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
      setStatus('That doesn\'t look like a YouTube URL.', 'error');
      return;
    }

    const online = await checkServer();
    if (!online) {
      setStatus('Cannot reach local server. Make sure <code>python server.py</code> is running.', 'error');
      return;
    }

    btn.disabled = true;
    setStatus('Sending to local server...', 'loading');
    showProgress(true);

    try {
      const response = await fetch(`${SERVER}/extract`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, format: selectedFormat }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({ error: 'Server error.' }));
        throw new Error(err.error || `HTTP ${response.status}`);
      }

      // ── Trigger browser download ──────────────────────
      const blob        = await response.blob();
      const disposition = response.headers.get('Content-Disposition') || '';
      const nameMatch   = disposition.match(/filename\*?=(?:UTF-8'')?["']?([^"';\n]+)/i);
      const fileName    = nameMatch
        ? decodeURIComponent(nameMatch[1].trim())
        : `audio.${selectedFormat}`;

      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href     = objectUrl;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 5000);

      showProgress(false);
      setStatus(`✓ Downloaded: <strong>${fileName}</strong>`, 'success');

    } catch (err) {
      showProgress(false);
      setStatus(`Error: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  // Allow Enter key to submit
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startExtraction();
  });
</script>
</body>
</html>
